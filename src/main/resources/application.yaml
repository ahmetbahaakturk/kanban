spring:
  application:
    name: kanban
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:kanban;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  flyway:
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
