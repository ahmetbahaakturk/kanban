<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kanbab</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #252525;
            --panel-2: #1a1a1a;
            --text: #f5f5f5;
            --muted: #a8a8a8;
            --line: #383838;
            --magenta: #c742a7;
            --red: #df3035;
            --blue: #327edc;
            --purple: #6b6ed0;
            --teal: #0cae96;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(960px, calc(100% - 40px));
            min-height: 100vh;
            margin: 0 auto;
            display: grid;
            align-items: center;
            padding: 56px 0;
        }

        .shell {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
            gap: 28px;
            align-items: center;
        }

        .intro h1 {
            margin: 0;
            font-size: clamp(48px, 9vw, 96px);
            line-height: 0.92;
            letter-spacing: 0;
        }

        .intro p {
            max-width: 560px;
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.55;
        }

        .preview {
            margin-top: 38px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            max-width: 520px;
        }

        .mini-column {
            min-height: 190px;
            border-radius: 8px;
            background: var(--panel);
            padding: 10px;
        }

        .mini-title {
            height: 14px;
            width: 64%;
            border-radius: 999px;
            background: #ececec;
            margin-bottom: 12px;
        }

        .mini-card {
            height: 46px;
            border-radius: 5px;
            margin-top: 8px;
        }

        .pink { background: var(--magenta); }
        .red { background: var(--red); }
        .blue { background: var(--blue); }
        .purple { background: var(--purple); }
        .teal { background: var(--teal); }

        .panel {
            background: var(--panel);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 22px 80px rgba(0, 0, 0, 0.45);
        }

        .panel h2 {
            margin: 0 0 18px;
            font-size: 28px;
            line-height: 1.1;
        }

        label {
            display: block;
            margin-bottom: 9px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            height: 54px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel-2);
            color: var(--text);
            font: inherit;
            font-size: 18px;
            padding: 0 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(107, 110, 208, 0.22);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            height: 52px;
            border: 0;
            border-radius: 6px;
            color: white;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }

        button:first-child {
            background: var(--teal);
        }

        button:last-child {
            background: var(--blue);
        }

        .hint {
            margin: 16px 0 0;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.45;
        }

        @media (max-width: 820px) {
            main {
                width: min(100% - 28px, 560px);
                align-items: start;
                padding-top: 36px;
            }

            .shell {
                grid-template-columns: 1fr;
            }

            .preview {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 430px) {
            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <section class="shell">
        <div class="intro">
            <h1>Kanbab</h1>
            <p>Open a board with a public id, or create a fresh board using the same id format.</p>
            <div class="preview" aria-hidden="true">
                <div class="mini-column">
                    <div class="mini-title"></div>
                    <div class="mini-card pink"></div>
                    <div class="mini-card purple"></div>
                </div>
                <div class="mini-column">
                    <div class="mini-title"></div>
                    <div class="mini-card red"></div>
                    <div class="mini-card blue"></div>
                    <div class="mini-card purple"></div>
                </div>
                <div class="mini-column">
                    <div class="mini-title"></div>
                    <div class="mini-card blue"></div>
                    <div class="mini-card teal"></div>
                </div>
                <div class="mini-column">
                    <div class="mini-title"></div>
                    <div class="mini-card teal"></div>
                    <div class="mini-card red"></div>
                </div>
            </div>
        </div>

        <form class="panel" id="boardForm">
            <h2>Board key</h2>
            <label for="publicId">Public id</label>
            <input id="publicId" name="publicId" autocomplete="off" placeholder="roadmap-2026" minlength="5" maxlength="60" required>
            <div class="actions">
                <button type="submit" data-mode="create">Create</button>
                <button type="submit" data-mode="find">Find</button>
            </div>
            <p class="hint">This mock redirects to the board page with the entered public id.</p>
        </form>
    </section>
</main>

<script>
    const form = document.querySelector("#boardForm");
    let mode = "find";

    document.querySelectorAll("button[data-mode]").forEach((button) => {
        button.addEventListener("click", () => {
            mode = button.dataset.mode;
        });
    });

    form.addEventListener("submit", (event) => {
        event.preventDefault();
        const publicId = document.querySelector("#publicId").value.trim();

        if (!publicId) {
            return;
        }

        const params = new URLSearchParams({ publicId, mode });
        window.location.href = `board.html?${params.toString()}`;
    });
</script>
</body>
</html>
